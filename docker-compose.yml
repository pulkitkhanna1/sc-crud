version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cpi-workflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cpi_workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
